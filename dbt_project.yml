config-version: 2
name: 'duckdb_semantic_views'
version: '0.1.0'
require-dbt-version: [">=1.0.0", "<2.0.0"]

flags:
  send_anonymous_usage_stats: false

profile: 'duckdb_semantic_views'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"
